name: Build livestream frame text scanner image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/livestream-frame-text-scanner-image.yml
      - Dockerfile.livestream-frame-text-scanner
      - .dockerignore
      - app/**
      - scripts/**
      - requirements*.txt
      - pyproject.toml
      - uv.lock
      - poetry.lock

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/weisserw/ibjjf-elo-livestream-frame-text-scanner
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.livestream-frame-text-scanner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=livestream-frame-text-scanner
          cache-to: type=gha,mode=max,scope=livestream-frame-text-scanner
